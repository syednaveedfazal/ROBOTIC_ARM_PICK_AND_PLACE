services:
  sort_robo:
    image: sort_robo:latest
    build:
      context: ..
      dockerfile: Dockerfile
    network_mode: host
    privileged: true
    environment:
      - DISPLAY=${DISPLAY:-:0}
      - QT_X11_NO_MITSHM=1
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    stdin_open: true
    tty: true
    command: >
      bash -c "
        ros2 launch sort_robo_bringup pick_and_place.launch.py &
        LAUNCH_PID=$$!;
        echo '[docker] Waiting 20s for Gazebo + MoveIt to start...';
        sleep 20;
        echo '[docker] Starting pick-and-place for BLUE block...';
        ros2 run pymoveit2 pick_and_place.py --ros-args -p target_color:=B;
        wait $$LAUNCH_PID
      "
